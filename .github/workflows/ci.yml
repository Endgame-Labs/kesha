name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Rust toolchain
        run: rustup show

      - name: Go tests
        run: go test ./...

      - name: Rust tests
        run: cargo test --locked

      - name: Verify local shim
        if: runner.os != 'Windows'
        run: make verify

      - name: Verify example app
        if: runner.os != 'Windows'
        run: make example

      - name: Windows compile check
        if: runner.os == 'Linux'
        run: GOOS=windows GOARCH=amd64 go test -exec=true ./...
