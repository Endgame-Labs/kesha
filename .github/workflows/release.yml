name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build shared library
        run: cargo build --release --locked

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          goos="$(go env GOOS)"
          goarch="$(go env GOARCH)"
          mkdir -p dist
          case "$goos" in
            darwin)
              source="target/release/libtiktoken_shim.dylib"
              asset="libtiktoken_shim_${goos}_${goarch}.dylib"
              ;;
            windows)
              source="target/release/tiktoken_shim.dll"
              asset="tiktoken_shim_${goos}_${goarch}.dll"
              ;;
            *)
              source="target/release/libtiktoken_shim.so"
              asset="libtiktoken_shim_${goos}_${goarch}.so"
              ;;
          esac
          cp "$source" "dist/$asset"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "dist/$asset" > "dist/$asset.sha256"
          else
            sha256sum "dist/$asset" > "dist/$asset.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ runner.os }}
          path: dist/*

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --title "${GITHUB_REF_NAME}"
